# See a full list of options at https://firebase.google.com/docs/app-hosting/apphosting-yaml
run:
  build:
    - npm i
    - npm run build
  start: npm run start
framework: nextjs
# Pass secrets from Cloud Secret Manager to the app at runtime
# These must be configured in the Firebase Console > App Hosting > Secrets
env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: SMTP_HOST
    secret: SMTP_HOST
  - variable: SMTP_USER
    secret: SMTP_USER
  - variable: SMTP_PASS
    secret: SMTP_PASS
  - variable: SMTP_PORT
    secret: SMTP_PORT
  - variable: SMTP_FROM_EMAIL
    secret: SMTP_FROM_EMAIL
